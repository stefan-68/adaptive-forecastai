<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030d1a"/>
      <stop offset="100%" style="stop-color:#040f1e"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#071525"/>
      <stop offset="100%" style="stop-color:#040d1c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0af" flood-opacity="0.08"/>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.7" fill="#1a9fff" opacity="0.06"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1adfff" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00dd88" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="620" fill="url(#bgGrad)"/>
  <rect width="1200" height="620" fill="url(#dots)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="#020c18" opacity="0.97"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#1adfff" stroke-width="0.6" opacity="0.3" filter="url(#glow)"/>
  <text x="36" y="22" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#e8f8ff" letter-spacing="1.5">Adaptive ForecastAI System</text>
  <text x="36" y="43" font-family="monospace" font-size="8" fill="#1a6a8a" letter-spacing="2">RETAIL DEMAND INTELLIGENCE  ·  DRIFT DETECTION  ·  DECISION SUPPORT</text>
  <text x="1164" y="22" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#1adfff" opacity="0.5" font-style="italic">"Forecasts degrade silently.</text>
  <text x="1164" y="38" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#1adfff" opacity="0.5" font-style="italic">We make it visible."</text>

  <!-- Layer labels -->
  <text x="116" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="2">DATA LAYER</text>
  <text x="460" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="2">ML LAYER</text>
  <text x="740" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="2">MEASUREMENT LAYER</text>
  <text x="1060" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="2">DECISION LAYER</text>

  <!-- Vertical dividers -->
  <line x1="240" y1="70" x2="240" y2="540" stroke="#1a3a5a" stroke-width="0.8" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="590" y1="70" x2="590" y2="540" stroke="#1a3a5a" stroke-width="0.8" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="880" y1="70" x2="880" y2="540" stroke="#1a3a5a" stroke-width="0.8" opacity="0.5" stroke-dasharray="4,4"/>

  <!-- ═══ DATA LAYER ═══ -->
  <!-- Transaction Data box -->
  <rect x="22" y="100" width="196" height="110" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="22" y="100" width="196" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="120" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">RETAIL TRANSACTIONS</text>
  <line x1="34" y1="124" x2="206" y2="124" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="38" y="139" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Sales history</text>
  <text x="38" y="153" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Store profiles</text>
  <text x="38" y="167" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ SKU catalog</text>
  <text x="38" y="181" font-family="monospace" font-size="7" fill="#1a4a6a">30 features per record</text>
  <text x="38" y="193" font-family="monospace" font-size="7" fill="#1a4a6a">multi-store · multi-SKU</text>

  <!-- External Signals box -->
  <rect x="22" y="230" width="196" height="110" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="22" y="230" width="196" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="120" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">EXTERNAL SIGNALS</text>
  <line x1="34" y1="254" x2="206" y2="254" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="38" y="269" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Economic events</text>
  <text x="38" y="283" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Weather signals</text>
  <text x="38" y="297" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Calendar / holidays</text>
  <text x="38" y="311" font-family="monospace" font-size="7" fill="#1a4a6a">VAT · fiscal · seasonal</text>
  <text x="38" y="323" font-family="monospace" font-size="7" fill="#1a4a6a">injected at real event dates</text>

  <!-- Zone Demographics box -->
  <rect x="22" y="360" width="196" height="110" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="22" y="360" width="196" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="120" y="378" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">ZONE DEMOGRAPHICS</text>
  <line x1="34" y1="384" x2="206" y2="384" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="38" y="399" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Income index</text>
  <text x="38" y="413" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Office / student density</text>
  <text x="38" y="427" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Loyalty signals</text>
  <text x="38" y="441" font-family="monospace" font-size="7" fill="#1a4a6a">spatial heterogeneity</text>
  <text x="38" y="453" font-family="monospace" font-size="7" fill="#1a4a6a">zone-level granularity</text>

  <!-- Arrows from data layer to ML layer -->
  <line x1="218" y1="155" x2="258" y2="280" stroke="#1adfff" stroke-width="1" opacity="0.4" marker-end="url(#arrowBlue)"/>
  <line x1="218" y1="285" x2="258" y2="290" stroke="#1adfff" stroke-width="1" opacity="0.4" marker-end="url(#arrowBlue)"/>
  <line x1="218" y1="415" x2="258" y2="310" stroke="#1adfff" stroke-width="1" opacity="0.4" marker-end="url(#arrowBlue)"/>

  <!-- ═══ ML LAYER ═══ -->
  <!-- LightGBM Forecaster -->
  <rect x="262" y="140" width="200" height="130" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="262" y="140" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="362" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">LIGHTGBM FORECASTER</text>
  <line x1="274" y1="164" x2="450" y2="164" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="278" y="179" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Segmented training</text>
  <text x="278" y="191" font-family="monospace" font-size="7" fill="#1a4a6a">store type x SKU category</text>
  <text x="278" y="207" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Baseline predictions</text>
  <text x="278" y="219" font-family="monospace" font-size="7" fill="#1a4a6a">stable period training</text>
  <text x="278" y="235" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ SageMaker training</text>
  <text x="278" y="247" font-family="monospace" font-size="7" fill="#1a4a6a">batch inference · S3 artifacts</text>
  <text x="362" y="262" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">AWS SageMaker</text>

  <!-- Prophet Segments -->
  <rect x="262" y="300" width="200" height="130" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="262" y="300" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="362" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">PROPHET SEGMENTS</text>
  <line x1="274" y1="324" x2="450" y2="324" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="278" y="339" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ 9 segment models</text>
  <text x="278" y="351" font-family="monospace" font-size="7" fill="#1a4a6a">urban / suburban / student</text>
  <text x="278" y="367" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Forecast vs. actuals</text>
  <text x="278" y="379" font-family="monospace" font-size="7" fill="#1a4a6a">time series per segment</text>
  <text x="278" y="395" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Scenario simulation</text>
  <text x="278" y="407" font-family="monospace" font-size="7" fill="#1a4a6a">what-if parametric runs</text>
  <text x="362" y="422" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">local inference · pkl artifacts</text>

  <!-- Arrow ML to Measurement -->
  <line x1="462" y1="205" x2="608" y2="240" stroke="#1adfff" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <line x1="462" y1="365" x2="608" y2="330" stroke="#1adfff" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowBlue)"/>

  <!-- ═══ MEASUREMENT LAYER ═══ -->
  <!-- Drift Detection -->
  <rect x="612" y="140" width="200" height="155" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="612" y="140" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="712" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">DRIFT DETECTION</text>
  <line x1="624" y1="164" x2="800" y2="164" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="628" y="179" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ MAPE deviation</text>
  <text x="628" y="191" font-family="monospace" font-size="7" fill="#1a4a6a">vs. stable period baseline</text>
  <text x="628" y="207" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ PSI per feature</text>
  <text x="628" y="219" font-family="monospace" font-size="7" fill="#1a4a6a">population stability index</text>
  <text x="628" y="235" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ KS test</text>
  <text x="628" y="247" font-family="monospace" font-size="7" fill="#1a4a6a">distribution shift detection</text>
  <text x="628" y="263" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Compound threshold</text>
  <text x="628" y="275" font-family="monospace" font-size="7" fill="#1a4a6a">severity: Low/Med/High/Critical</text>
  <text x="712" y="288" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">Evidently AI</text>

  <!-- Chronic/Acute Separation -->
  <rect x="612" y="315" width="200" height="145" rx="6" fill="url(#boxGrad)" stroke="#2a4a2a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="612" y="315" width="200" height="2" rx="1" fill="#2a7a4a" opacity="0.7"/>
  <text x="712" y="333" text-anchor="middle" font-family="monospace" font-size="8" fill="#2aaa6a" letter-spacing="1">CHRONIC / ACUTE</text>
  <line x1="624" y1="339" x2="800" y2="339" stroke="#1a3a3a" stroke-width="0.7"/>
  <text x="628" y="354" font-family="monospace" font-size="7.5" fill="#3a9a6a">▸ Prophet + shock regressors</text>
  <text x="628" y="366" font-family="monospace" font-size="7" fill="#1a4a3a">chronic drift vs. acute shock</text>
  <text x="628" y="382" font-family="monospace" font-size="7.5" fill="#3a9a6a">▸ Event attribution</text>
  <text x="628" y="394" font-family="monospace" font-size="7" fill="#1a4a3a">dateable · bounded · quantified</text>
  <text x="628" y="410" font-family="monospace" font-size="7.5" fill="#3a9a6a">▸ Counterfactual baseline</text>
  <text x="628" y="422" font-family="monospace" font-size="7" fill="#1a4a3a">pre-shock trajectory preserved</text>
  <text x="712" y="452" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a3a" font-style="italic">separate cause before routing action</text>

  <!-- CloudWatch -->
  <rect x="612" y="480" width="200" height="55" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="612" y="480" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="712" y="498" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">CLOUDWATCH</text>
  <line x1="624" y1="504" x2="800" y2="504" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="628" y="518" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Prediction vs. actuals · alarms · SNS</text>
  <text x="628" y="530" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">AWS CloudWatch · EventBridge</text>

  <!-- Arrows Measurement to Decision -->
  <line x1="812" y1="210" x2="898" y2="240" stroke="#1adfff" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <line x1="812" y1="380" x2="898" y2="340" stroke="#00dd88" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══ DECISION LAYER ═══ -->
  <!-- Rule Engine -->
  <rect x="902" y="140" width="200" height="130" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="902" y="140" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="1002" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">RULE ENGINE</text>
  <line x1="914" y1="164" x2="1090" y2="164" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="918" y="179" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Drift type routing</text>
  <text x="918" y="191" font-family="monospace" font-size="7" fill="#1a4a6a">chronic vs. acute path split</text>
  <text x="918" y="207" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Priority ranking</text>
  <text x="918" y="219" font-family="monospace" font-size="7" fill="#1a4a6a">severity x store x SKU</text>
  <text x="918" y="235" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ ROI estimation</text>
  <text x="918" y="247" font-family="monospace" font-size="7" fill="#1a4a6a">actionable by segment</text>
  <text x="1002" y="262" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">deterministic · auditable</text>

  <!-- Generative AI -->
  <rect x="902" y="290" width="200" height="155" rx="6" fill="url(#boxGrad)" stroke="#1a3a5a" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="902" y="290" width="200" height="2" rx="1" fill="#1a6a8a" opacity="0.7"/>
  <text x="1002" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a9abf" letter-spacing="1">GENERATIVE AI</text>
  <line x1="914" y1="314" x2="1090" y2="314" stroke="#1a3a5a" stroke-width="0.7"/>
  <text x="918" y="329" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Scenario reasoning</text>
  <text x="918" y="341" font-family="monospace" font-size="7" fill="#1a4a6a">drift signal → narrative</text>
  <text x="918" y="357" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Plain-language actions</text>
  <text x="918" y="369" font-family="monospace" font-size="7" fill="#1a4a6a">SKU-level · store-level</text>
  <text x="918" y="385" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Live event response</text>
  <text x="918" y="397" font-family="monospace" font-size="7" fill="#1a4a6a">weather · fiscal · promotional</text>
  <text x="918" y="413" font-family="monospace" font-size="7.5" fill="#3a7a9a">▸ Bilingual output</text>
  <text x="918" y="425" font-family="monospace" font-size="7" fill="#1a4a6a">EN / RO · human-in-the-loop</text>
  <text x="1002" y="436" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#0a4a6a" font-style="italic">AWS Bedrock · Claude Sonnet</text>

  <!-- Bottom bar -->
  <rect x="0" y="548" width="1200" height="72" fill="#020810" opacity="0.97"/>
  <line x1="0" y1="548" x2="1200" y2="548" stroke="#1adfff" stroke-width="0.5" opacity="0.2"/>

  <rect x="28" y="560" width="1.5" height="36" fill="#00dd88" opacity="0.5"/>
  <text x="40" y="572" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="1.5">DETECTION WINDOW</text>
  <text x="40" y="588" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#00dd88">72 hours</text>
  <text x="40" y="604" font-family="monospace" font-size="7" fill="#3a7a9a">vs. 3-week industry lag</text>
  <line x1="220" y1="556" x2="220" y2="616" stroke="#1a3a5a" stroke-width="0.8"/>

  <rect x="236" y="560" width="1.5" height="36" fill="#1adfff" opacity="0.4"/>
  <text x="248" y="572" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="1.5">FORECAST ERROR REDUCTION</text>
  <text x="248" y="588" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1adfff">20–50%</text>
  <text x="248" y="604" font-family="monospace" font-size="7" fill="#3a7a9a">McKinsey AI Forecasting 2022</text>
  <line x1="480" y1="556" x2="480" y2="616" stroke="#1a3a5a" stroke-width="0.8"/>

  <rect x="496" y="560" width="1.5" height="36" fill="#1adfff" opacity="0.4"/>
  <text x="508" y="572" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="1.5">INVENTORY DISTORTION</text>
  <text x="508" y="588" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1adfff">$1.7T</text>
  <text x="508" y="604" font-family="monospace" font-size="7" fill="#3a7a9a">global annual cost · IHL Group 2024</text>
  <line x1="740" y1="556" x2="740" y2="616" stroke="#1a3a5a" stroke-width="0.8"/>

  <rect x="756" y="560" width="1.5" height="36" fill="#00dd88" opacity="0.5"/>
  <text x="768" y="572" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="1.5">RETRAIN PRINCIPLE</text>
  <text x="768" y="585" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#ddeeff">On signal, not calendar</text>
  <text x="768" y="601" font-family="monospace" font-size="7" fill="#3a7a9a">compound threshold · clean data · right moment</text>
  <line x1="1010" y1="556" x2="1010" y2="616" stroke="#1a3a5a" stroke-width="0.8"/>

  <rect x="1026" y="560" width="1.5" height="36" fill="#00dd88" opacity="0.5"/>
  <text x="1038" y="572" font-family="monospace" font-size="7" fill="#1a5a7a" letter-spacing="1.5">SPATIAL PRINCIPLE</text>
  <text x="1038" y="585" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#ddeeff">Zone-level granularity</text>
  <text x="1038" y="601" font-family="monospace" font-size="7" fill="#3a7a9a">same event · different impact · per store type</text>

</svg>
